app:
  name: "tabs_generator-api"
  host: "0.0.0.0"
  port: 8004
  log_level: "info"

tabs:
  output_format: "json"
  tuning: [40, 45, 50, 55, 59, 64]
  max_fret: 24
  min_confidence: 0.4
  onset_threshold: 0.5
  frame_threshold: 0.3

audio_cleaning:
  enabled: true
  low_cut_hz: 75.0
  high_cut_hz: 5000.0
  noise_gate_db: -40.0

post_processing:
  enabled: true
  min_duration: 0.05
  merge_gap: 0.03
  midi_min: 40
  midi_max: 88
  max_polyphony: 6
  min_confidence: 0.5

strum_detection:
  enabled: true
  min_onset_spread_ms: 2.0
  full_confidence_spread_ms: 5.0
  min_strum_confidence: 0.3
  min_chord_size: 2

processing:
  temp_dir: "/tmp/tabs_generator"
  cleanup_temp: true

storage:
