apiVersion: 1

datasources:
  - name: Smart Guitar CloudWatch
    type: cloudwatch
    access: proxy
    uid: smart-guitar-cloudwatch
    jsonData:
      authType: keys
      defaultRegion: ${AWS_REGION}
    secureJsonData:
      accessKey: "${AWS_ACCESS_KEY}"
      secretKey: "${AWS_SECRET_KEY}"
    isDefault: false
