services:
  promtail:
    image: grafana/promtail:3.3.2
    container_name: smart-guitar-promtail
    volumes:
      - ./grafana/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/smart-guitar:ro
    command: -config.file=/etc/promtail/config.yml
    network_mode: host
    restart: unless-stopped
